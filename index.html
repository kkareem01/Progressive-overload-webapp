<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0b0d12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Overload" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="stylesheet" href="/styles.css" />
  <title>Overload</title>
</head>
<body>
  <header class="topbar">
    <button id="back-btn" class="iconbtn" aria-label="Back" hidden>←</button>
    <h1 id="title">Overload</h1>
    <button id="status-pill" class="pill" aria-live="polite" hidden></button>
  </header>

  <main id="view" class="view" aria-live="polite"></main>

  <template id="tpl-home">
    <section class="home">
      <p class="subtle">Pick today's workout.</p>
      <div class="day-grid">
        <button class="daybtn" data-day="push"><span>Push</span></button>
        <button class="daybtn" data-day="pull"><span>Pull</span></button>
        <button class="daybtn" data-day="leg"><span>Leg</span></button>
      </div>
    </section>
  </template>

  <template id="tpl-day">
    <section class="day">
      <ul class="exlist" id="exlist"></ul>
    </section>
  </template>

  <template id="tpl-logger">
    <section class="logger">
      <div class="prev" id="prev">
        <h3>Last session</h3>
        <ul id="prev-list" class="setlist setlist--dim"></ul>
      </div>

      <div class="today">
        <h3>Today <span id="today-date" class="subtle"></span></h3>
        <ul id="today-list" class="setlist"></ul>
      </div>

      <div class="timer-box" id="timer-box" hidden>
        <span class="timer-label">Rest</span>
        <span class="timer-time" id="timer-time">2:00</span>
        <button class="iconbtn" id="timer-stop" aria-label="Stop timer">✕</button>
      </div>

      <div class="actions" id="logger-actions">
        <div class="tabs">
          <button class="tab tab--active" data-tab="log">Log</button>
          <button class="tab" data-tab="progress">Progress</button>
          <button class="tab" data-tab="history">History</button>
        </div>

        <div class="tabpane" id="pane-log">
          <div class="steppers">
            <div class="stepper">
              <label>Weight (lbs)</label>
              <div class="row">
                <button class="bigbtn" data-step="weight" data-delta="-5">−5</button>
                <input id="weight" inputmode="decimal" type="text" value="0" />
                <button class="bigbtn" data-step="weight" data-delta="5">+5</button>
              </div>
              <div class="row small">
                <button class="smallbtn" data-step="weight" data-delta="-2.5">−2.5</button>
                <button class="smallbtn" data-step="weight" data-delta="2.5">+2.5</button>
              </div>
            </div>
            <div class="stepper">
              <label>Reps</label>
              <div class="row">
                <button class="bigbtn" data-step="reps" data-delta="-1">−1</button>
                <input id="reps" inputmode="numeric" type="text" value="8" />
                <button class="bigbtn" data-step="reps" data-delta="1">+1</button>
              </div>
            </div>
          </div>
          <button class="logbtn" id="log-set">Log set</button>
        </div>

        <div class="tabpane" id="pane-progress" hidden>
          <canvas id="chart" height="220" aria-label="Estimated 1RM over time"></canvas>
          <p class="subtle" id="chart-empty" hidden>Not enough data yet. Log a few sessions and a trend will show up here.</p>
        </div>

        <div class="tabpane" id="pane-history" hidden>
          <ul id="history-list" class="setlist setlist--full"></ul>
        </div>
      </div>
    </section>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js" defer></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
